---
- name: CI sanity check for ansible-pihole
  hosts: ci
  gather_facts: true
  become: true

  # Keep this minimal and safe for generic Ubuntu runners
  vars:
    _ci_ansible_user: "{{ lookup('env', 'USER') | default('runner', true) }}"
    ansible_user: "{{ _ci_ansible_user }}"
    ansible_user_home_dir: "{{ '/root' if _ci_ansible_user == 'root' else '/home/' ~ _ci_ansible_user }}"
    # Set simple/default-ish vars so roles don’t blow up
    github_user_for_ssh_key: "root"
    timezone: "Etc/UTC"
    static_dns: "1.1.1.1"

    # Make sure HA bits don’t run in CI
    pihole_ha_mode: false
    # GitHub-hosted runners: skip firewalld port management (role default is true).
    firewall_deploy: false

    password_lock: false
    # Point Pi-hole image at something valid, but we're in --check anyway
    pihole_image: "pihole/pihole:latest"
    pihole_compose_dir: "/opt/pihole"

  roles:
    - role: bootstrap
      tags: [bootstrap, system]
    - role: geerlingguy.docker
      tags: [docker, container]
    - role: pihole
      tags: [pihole, dns]
