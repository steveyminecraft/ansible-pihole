---
name: Security scanning

"on":
  push:
    branches:
      - master
      - "feature/**"
  pull_request:
    branches:
      - master
  schedule:
    - cron: "21 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL - GitHub Actions
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.1
        with:
          languages: actions
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.36.1

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4.36.1
        with:
          sarif_file: trivy-results.sarif

  default-images:
    name: Resolve default container images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.images.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install YAML parser
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Resolve image matrix from role defaults
        id: images
        run: |
          echo "matrix=$(python scripts/default-container-images.py --github-matrix)" \
            >> "$GITHUB_OUTPUT"

  trivy-images:
    name: Trivy image scan - ${{ matrix.key }}
    runs-on: ubuntu-latest
    needs: default-images
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.default-images.outputs.matrix) }}

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run Trivy against default image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}
          scanners: vuln
          format: sarif
          output: trivy-${{ matrix.key }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Default images are upstream artifacts we do not build here. Upload
          # findings to code scanning, but keep PR gating on repository content.
          exit-code: "0"

      - name: Upload Trivy image results
        if: always()
        uses: github/codeql-action/upload-sarif@v4.36.0
        with:
          sarif_file: trivy-${{ matrix.key }}.sarif
          category: trivy-image-${{ matrix.key }}
