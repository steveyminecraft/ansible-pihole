---
name: CI - Ansible-Pihole Checks

"on":
  push:
    branches:
      - dev
      - master
      - "feature/**"
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

env:
  # Opt into Node.js 24 for GitHub Actions (silences Node 20 deprecation warnings).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  lint:
    name: Ansible & YAML lint (${{ matrix.runner }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
        python-version: ["3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade 'ansible-core>=2.20.5,<2.21' ansible-lint yamllint galaxy-importer

      - name: Build and validate collection for Ansible Galaxy
        run: |
          ansible-galaxy collection build
          python -m galaxy_importer.main "$(ls -1 steveyminecraft-pihole-*.tar.gz | head -1)"

      - name: Install collections
        run: ./scripts/install-ansible-collections.sh

      - name: Ansible Lint
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
        run: |
          ansible --version
          ansible-lint --version
          ansible-lint -p roles playbooks molecule

      - name: YAML lint
        run: yamllint roles playbooks molecule inventory

  ansible-tests-ubuntu:
    name: Ansible syntax & dry-run (${{ matrix.runner }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.runner }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
        python-version: ["3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade 'ansible-core>=2.20.5,<2.21'

      - name: Show Ansible version
        run: ansible --version

      - name: Install collections
        run: ./scripts/install-ansible-collections.sh

      # 1) Syntax-check all main playbooks
      - name: Syntax check playbooks
        run: |
          ansible-playbook -i inventory/ci/ci.yml playbooks/bootstrap-pihole.yaml --syntax-check
          ansible-playbook -i inventory/ci/ci.yml playbooks/bootstrap-pihole.yaml --syntax-check \
            -e pihole_enable_unbound=false -e '{"pihole_upstream_resolvers":["1.1.1.1"]}'
          ansible-playbook -i inventory/ci/ci.yml playbooks/update-pihole.yaml --syntax-check
          ansible-playbook -i inventory/ci/ci.yml playbooks/keepalived.yaml --syntax-check
          ansible-playbook -i inventory/ci/ci.yml playbooks/sync.yaml --syntax-check


      # 2) Minimal roles only (inventory/ci/ci.yml defines group `ci` for this play)
      - name: Check-mode converge (ci-bootstrap)
        run: |
          ansible-playbook -i inventory/ci/ci.yml playbooks/ci-bootstrap.yaml --check

      - name: Validate Pi-hole Compose modes
        run: ansible-playbook playbooks/ci-validate-pihole-modes.yaml

  ci-safety-checks:
    name: Hosted CI safety checks
    runs-on: ubuntu-24.04
    needs: ansible-tests-ubuntu
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install YAML tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade yamllint

      - name: Validate workflow and project YAML formatting
        run: |
          yamllint .github/workflows molecule inventory playbooks roles

      - name: Validate Molecule scenario file structure
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          required = {
              "molecule/ubuntu/molecule.yml": ["dependency", "driver", "platforms", "provisioner", "scenario"],
              "molecule/default/molecule.yml": ["dependency", "driver", "platforms", "provisioner", "scenario"],
              "molecule/nebula-sync-migration/molecule.yml": ["dependency", "driver", "platforms", "provisioner", "scenario"],
          }
          for relpath, keys in required.items():
              path = Path(relpath)
              data = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
              missing = [k for k in keys if k not in data]
              if missing:
                  raise SystemExit(f"{relpath} missing keys: {missing}")
          print("Molecule scenario structure checks passed.")
          PY

      - name: Validate default container image matrix
        run: |
          python scripts/default-container-images.py --github-matrix
          python scripts/validate-secure-defaults.py
