---
name: CI - Ansible-Pihole Checks

"on":
  push:
    branches:
      - dev
      - master
      - "feature/**"
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

env:
  python_version: 3.12

jobs:
  lint:
    name: Ansible & YAML lint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible requests docker

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core==2.20.1" "ansible-lint==25.12.1" "yamllint==1.37.1"

      - name: Install Galaxy roles and collections
        run: ./scripts/install-ansible-collections.sh

      - name: Ansible Lint
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
        run: |
          ansible --version
          ansible-lint --version
          ansible-lint -p roles playbooks molecule

      - name: YAML lint
        run: yamllint .

  ansible-tests-ubuntu:
    name: Ansible syntax & dry-run
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible requests docker

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          # community.docker (e.g. docker_image_pull in roles/pihole) needs Docker SDK + requests on the controller
          pip install ansible docker

      - name: Show Ansible version
        run: ansible --version

      - name: Install Galaxy roles and collections
        run: ./scripts/install-ansible-collections.sh

      # 1) Syntax-check all main playbooks
      - name: Syntax check playbooks
        run: |
          ansible-playbook -i inventory/ci/ci.yml playbooks/bootstrap-pihole.yaml --syntax-check
          ansible-playbook -i inventory/ci/ci.yml playbooks/update-pihole.yaml --syntax-check
          ansible-playbook -i inventory/ci/ci.yml playbooks/keepalived.yaml --syntax-check
          ansible-playbook -i inventory/ci/ci.yml playbooks/sync.yaml --syntax-check


      # 2) Minimal roles only (inventory/ci/ci.yml defines group `ci` for this play)
      - name: Check-mode converge (ci-bootstrap)
        run: |
          ansible-playbook -i inventory/ci/ci.yml playbooks/ci-bootstrap.yaml --check
