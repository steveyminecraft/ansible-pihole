---
# Releases and tags are only produced from the master branch.
# Typical flow: merge topic → dev → PR dev → master (opens/updates a Release PR) →
# merge Release PR → tag v*.*.*, GitHub release, Galaxy publish.
# No workflow_dispatch or tag-push triggers (see removed release.yml).
name: Release

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release please
    if: >-
      github.repository_owner == 'steveyminecraft'
      && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@a37ac6e4f6449ce8b3f7607e4d97d0146028dc0b # v4.1.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-galaxy:
    name: Publish collection to Ansible Galaxy
    needs: release-please
    if: >-
      needs.release-please.outputs.release_created == 'true'
      && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build and publish steveyminecraft.pihole
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
        run: |
          python -m pip install --upgrade pip 'ansible-core>=2.20.5,<2.21'
          ansible-galaxy collection build
          if [ -z "${GALAXY_API_KEY:-}" ]; then
            echo "GALAXY_API_KEY is not set; skipping Galaxy publish."
            exit 0
          fi
          artifact="$(ls -1 steveyminecraft-pihole-*.tar.gz | head -1)"
          echo "Publishing ${artifact} for tag ${{ needs.release-please.outputs.tag_name }}"
          ansible-galaxy collection publish "${artifact}" --api-key "${GALAXY_API_KEY}"
