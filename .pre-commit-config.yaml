---
# Use the ansible-core 2.20.5 runtime floor; CI also validates 2.21.
repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - -c
          - .yamllint

  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        args:
          - -p
          - roles
          - playbooks
          - molecule
        always_run: true
        pass_filenames: false
        additional_dependencies:
          - ansible-core==2.21.1
        env:
          ANSIBLE_CONFIG: ansible.cfg
