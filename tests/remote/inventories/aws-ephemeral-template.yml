---
# Template used by GitHub Actions AWS remote tests.
# Runtime values are generated by tests/remote/aws/create-ephemeral-env.sh.
all:
  hosts:
    aws-ephemeral-01:
      ansible_host: REPLACE_PUBLIC_IP
      ansible_ssh_private_key_file: REPLACE_SSH_KEY_PATH
      priority: 100
      keepalive_role: MASTER
  vars:
    ansible_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3
    ansible_user_home_dir: /home/ubuntu
    github_user_for_ssh_key: replace-me
    password_lock: true
    timezone: Etc/UTC
    pihole_enable_unbound: true
    pihole_ha_mode: false
    pihole_vip_ipv4: REPLACE_PRIVATE_IP_CIDR
    pihole_upstream_resolvers:
      - 1.1.1.1
      - 1.0.0.1
    pihole_environment_variables:
      TZ: Etc/UTC
      FTLCONF_webserver_api_password: REPLACE_WITH_ANSIBLE_VAULT
      FTLCONF_dns_listeningMode: all
      DHCP_ACTIVE: false
      REV_SERVER: false
