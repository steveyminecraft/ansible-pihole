---
# Shared Molecule prepare: minimal packages for Ansible + verification (dig, ip).
- name: Prepare instances for Ansible and tests
  hosts: all
  gather_facts: true
  tasks:
    - name: Install Python and DNS tools (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - python3
          - python3-apt
          - dnsutils
          - iproute2
        update_cache: true
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    - name: Release DNF lock holders common on EL desktops/lab images
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - packagekit.service
        - dnf-makecache.timer
      failed_when: false
      when: ansible_facts['os_family'] == 'RedHat'

    - name: Install Python and DNS tools (RedHat family)
      ansible.builtin.dnf:
        name:
          - python3
          - bind-utils
          - iproute
        state: present
      when: ansible_facts['os_family'] == 'RedHat'
