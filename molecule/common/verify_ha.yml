---
# Shared Molecule verify: HA / DNS / firewall / Docker failover (standalone playbook).
- name: Verify HA Pi-hole deployment (Molecule)
  hosts: all
  gather_facts: false
  any_errors_fatal: true
  vars:
    vip_address: "{{ (pihole_vip_ipv4 | default('192.168.56.10/24')) | split('/') | first }}"
    node1: "{{ (groups['all'] | sort)[0] }}"
    node2: "{{ (groups['all'] | sort)[1] }}"
    nebula_sync_controller_host: "{{ (groups['nebula_sync_controller'] | default([node1]))[0] }}"
    nebula_sync_replica_host: "{{ node2 }}"
    ha_container_name: "{{ pihole_container_name | default('pihole') }}"
    nebula_sync_test_list_url: "https://example.invalid/nebula-sync-test.txt"
    nebula_sync_test_list_url_legacy: "https://example.invalid/nebula-sync-test.txt"
    nebula_sync_test_list_comment: molecule-nebula-sync-test
    pihole_api_password: "{{ pihole_environment_variables.FTLCONF_webserver_api_password }}"
    nebula_sync_replica_api_url: "{{ nebula_sync_replicas[0].url }}"
    nebula_sync_secret_host_dir: "{{ nebula_sync_secret_dir | default((nebula_sync_dir | default('/opt/nebula-sync')) ~ '/secrets') }}"
    nebula_sync_env_host_path: >-
      {{ (nebula_sync_dir | default('/opt/nebula-sync')) ~ '/' ~ (nebula_sync_env_filename | default('.env')) }}
    nebula_sync_primary_secret_container_path: >-
      {{ (nebula_sync_secret_container_dir | default('/run/secrets')) ~ '/' ~ (nebula_sync_primary_secret_filename | default('primary')) }}
    nebula_sync_replicas_secret_container_path: >-
      {{ (nebula_sync_secret_container_dir | default('/run/secrets')) ~ '/' ~ (nebula_sync_replicas_secret_filename | default('replicas')) }}
    nebula_sync_primary_secret_host_path: >-
      {{ nebula_sync_secret_host_dir }}/{{ nebula_sync_primary_secret_filename | default('primary') }}
    nebula_sync_replicas_secret_host_path: >-
      {{ nebula_sync_secret_host_dir }}/{{ nebula_sync_replicas_secret_filename | default('replicas') }}
    nebula_sync_primary_secret_bind_mount: >-
      {{ nebula_sync_primary_secret_host_path }}:{{ nebula_sync_primary_secret_container_path }}:ro
    nebula_sync_replicas_secret_bind_mount: >-
      {{ nebula_sync_replicas_secret_host_path }}:{{ nebula_sync_replicas_secret_container_path }}:ro
    nebula_sync_mounts_fmt: "{{ '{{json .Mounts}}' }}"
    docker_inspect_env_fmt: "{{ '{{range .Config.Env}}{{println .}}{{end}}' }}"
  tasks:
    - name: Ensure node is reachable
      ansible.builtin.ping:

    - name: Ensure keepalived is running before tests
      ansible.builtin.service:
        name: keepalived
        state: started

    - name: Wait for Pi-hole DNS (TCP 53 on loopback)
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 53
        timeout: 180
        delay: 2

    # --- Failover: stop MASTER (node1), VIP should appear on node2 ---
    - name: Stop keepalived on primary (initiate VRRP failover)
      ansible.builtin.service:
        name: keepalived
        state: stopped
      when: inventory_hostname == node1

    - name: Wait for VIP on backup after VRRP failover
      ansible.builtin.command: ip -4 addr show
      register: ip_node2_failover
      changed_when: false
      until: vip_address in ip_node2_failover.stdout
      retries: 30
      delay: 2
      when: inventory_hostname == node2

    - name: Assert VIP moved to backup node
      ansible.builtin.assert:
        that:
          - vip_address in ip_node2_failover.stdout
        fail_msg: "FAILOVER FAILED: VIP {{ vip_address }} not found on {{ node2 }}."
      when: inventory_hostname == node2

    # --- Failback ---
    - name: Restart keepalived on primary
      ansible.builtin.service:
        name: keepalived
        state: started
      when: inventory_hostname == node1

    - name: Stop keepalived on backup
      ansible.builtin.service:
        name: keepalived
        state: stopped
      when: inventory_hostname == node2

    - name: Wait for VIP back on primary after failback
      ansible.builtin.command: ip -4 addr show
      register: ip_node1_failback
      changed_when: false
      until: vip_address in ip_node1_failback.stdout
      retries: 30
      delay: 2
      when: inventory_hostname == node1

    - name: Assert VIP moved back to primary
      ansible.builtin.assert:
        that:
          - vip_address in ip_node1_failback.stdout
        fail_msg: "FAILBACK FAILED: VIP {{ vip_address }} not found on {{ node1 }}."
      when: inventory_hostname == node1

    - name: Restart keepalived on backup (restore normal HA)
      ansible.builtin.service:
        name: keepalived
        state: started
      when: inventory_hostname == node2

    # --- Firewall (firewalld; matches bootstrap on Debian/Rocky for this project) ---
    - name: Check firewalld status
      ansible.builtin.command: firewall-cmd --state
      register: firewalld_status
      changed_when: false
      when: pihole_firewall_deploy | default(false) | bool

    - name: Assert firewalld is running
      ansible.builtin.assert:
        that:
          - firewalld_status.stdout == "running"
        fail_msg: "Firewall service is not running."
      when: pihole_firewall_deploy | default(false) | bool

    - name: Retrieve open firewall ports
      ansible.builtin.command: firewall-cmd --list-ports
      register: open_ports
      changed_when: false
      when: pihole_firewall_deploy | default(false) | bool

    - name: Assert required ports are open in firewalld
      ansible.builtin.assert:
        that:
          - "'53/tcp' in open_ports.stdout"
          - "'53/udp' in open_ports.stdout"
          - (pihole_webport_http ~ '/tcp') in open_ports.stdout
          - (pihole_webport_https ~ '/tcp') in open_ports.stdout
        fail_msg: "Firewall missing required ports."
      when: pihole_firewall_deploy | default(false) | bool

    # --- DNS ---
    - name: Resolve via local Pi-hole on each node
      ansible.builtin.command: dig +short @127.0.0.1 google.com
      register: dns_local
      changed_when: false
      failed_when: dns_local.stdout == ""

    - name: Assert local DNS returned IPv4
      ansible.builtin.assert:
        that:
          - dns_local.stdout_lines
            | select('match', '^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$')
            | list
            | length > 0
        fail_msg: "Local DNS did not return an IPv4."

    - name: Resolve via VIP (run once on first host)
      ansible.builtin.command: dig +short @{{ vip_address }} google.com
      register: dns_vip
      changed_when: false
      failed_when: dns_vip.stdout == ""
      run_once: true

    - name: Assert VIP DNS returned IPv4
      ansible.builtin.assert:
        that:
          - dns_vip.stdout_lines
            | select('match', '^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$')
            | list
            | length > 0
        fail_msg: "VIP DNS did not return a valid IPv4."
      run_once: true

    # --- Nebula Sync (controller host only) ---
    - name: Check Nebula Sync container on replica (should be absent)
      community.docker.docker_container_info:
        name: "{{ nebula_sync_container_name | default('nebula') }}"
      register: nebula_sync_replica_container_info
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_replica_host
        - inventory_hostname != nebula_sync_controller_host

    - name: Assert Nebula Sync is not deployed on replica nodes
      ansible.builtin.assert:
        that:
          - not (nebula_sync_replica_container_info.exists | default(false))
        fail_msg: >-
          Nebula Sync should run only on {{ nebula_sync_controller_host }}, not on
          {{ inventory_hostname }}.
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_replica_host
        - inventory_hostname != nebula_sync_controller_host

    - name: Check Nebula Sync container on controller
      community.docker.docker_container_info:
        name: "{{ nebula_sync_container_name | default('nebula') }}"
      register: nebula_sync_container_info
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host

    - name: Assert Nebula Sync container is running on controller
      ansible.builtin.assert:
        that:
          - nebula_sync_container_info.exists | default(false)
          - nebula_sync_container_info.container.State.Running | default(false)
        fail_msg: "Nebula Sync container is not running on {{ nebula_sync_controller_host }}."
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host

    - name: Read Nebula Sync container environment
      no_log: true
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - --format
          - "{{ docker_inspect_env_fmt }}"
          - "{{ nebula_sync_container_name | default('nebula') }}"
      register: nebula_sync_env
      changed_when: false
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host

    - name: Stat Nebula Sync env file
      ansible.builtin.stat:
        path: "{{ nebula_sync_env_host_path }}"
      register: nebula_sync_env_file_stat
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host
        - nebula_sync_use_env_file | default(true) | bool

    - name: Read Nebula Sync env file
      no_log: true
      ansible.builtin.slurp:
        src: "{{ nebula_sync_env_host_path }}"
      register: nebula_sync_env_file
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host
        - nebula_sync_use_env_file | default(true) | bool
        - nebula_sync_env_file_stat.stat.exists | default(false)

    - name: Set Nebula Sync effective environment lines
      no_log: true
      ansible.builtin.set_fact:
        nebula_sync_effective_env_lines: >-
          {{
            (
              (nebula_sync_env_file.content | b64decode).splitlines()
              if (
                (nebula_sync_use_env_file | default(true) | bool)
                and (nebula_sync_env_file.content is defined)
              )
              else nebula_sync_env.stdout_lines
            )
          }}
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host

    - name: Read Nebula Sync container mounts
      no_log: true
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - --format
          - "{{ nebula_sync_mounts_fmt }}"
          - "{{ nebula_sync_container_name | default('nebula') }}"
      register: nebula_sync_mounts
      changed_when: false
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host

    - name: Set Nebula Sync secret-file verification facts
      no_log: true
      ansible.builtin.set_fact:
        nebula_sync_primary_file_configured: >-
          {{
            (('PRIMARY_FILE=' ~ nebula_sync_primary_secret_container_path) in nebula_sync_effective_env_lines)
            or (('PRIMARY_FILE=' ~ nebula_sync_primary_secret_container_path) in nebula_sync_env.stdout_lines)
          }}
        nebula_sync_replicas_file_configured: >-
          {{
            (('REPLICAS_FILE=' ~ nebula_sync_replicas_secret_container_path) in nebula_sync_effective_env_lines)
            or (('REPLICAS_FILE=' ~ nebula_sync_replicas_secret_container_path) in nebula_sync_env.stdout_lines)
          }}
        nebula_sync_plaintext_primary_present: >-
          {{
            ((nebula_sync_effective_env_lines | select('match', '^PRIMARY=') | list | length) > 0)
            or ((nebula_sync_env.stdout_lines | select('match', '^PRIMARY=') | list | length) > 0)
          }}
        nebula_sync_plaintext_replicas_present: >-
          {{
            ((nebula_sync_effective_env_lines | select('match', '^REPLICAS=') | list | length) > 0)
            or ((nebula_sync_env.stdout_lines | select('match', '^REPLICAS=') | list | length) > 0)
          }}
        nebula_sync_mounted_secret_destinations: >-
          {{
            (nebula_sync_mounts.stdout | from_json)
            | map(attribute='Destination')
            | list
          }}
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host

    - name: Assert Nebula Sync uses secret-file credential configuration
      ansible.builtin.assert:
        that:
          - nebula_sync_use_secret_files | default(true) | bool
          - nebula_sync_primary_file_configured | bool
          - nebula_sync_replicas_file_configured | bool
          - not (nebula_sync_plaintext_primary_present | bool)
          - not (nebula_sync_plaintext_replicas_present | bool)
          - nebula_sync_primary_secret_container_path in nebula_sync_mounted_secret_destinations
          - nebula_sync_replicas_secret_container_path in nebula_sync_mounted_secret_destinations
        fail_msg: >-
          Nebula Sync is not using secret-file credential configuration.
          primary_file_configured={{ nebula_sync_primary_file_configured | default(false) }},
          replicas_file_configured={{ nebula_sync_replicas_file_configured | default(false) }},
          plaintext_primary_present={{ nebula_sync_plaintext_primary_present | default(false) }},
          plaintext_replicas_present={{ nebula_sync_plaintext_replicas_present | default(false) }}.
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host
        - nebula_sync_use_secret_files | default(true) | bool

    - name: Assert Nebula Sync uses plaintext credential configuration (legacy mode)
      no_log: true
      ansible.builtin.assert:
        that:
          - ('PRIMARY=' ~ nebula_sync_primary_url ~ '|' ~ nebula_sync_primary_password) in nebula_sync_env.stdout_lines
          - nebula_sync_replicas | length > 0
          - nebula_sync_env.stdout_lines | select('search', '^REPLICAS=.*' ~ nebula_sync_replicas[0].url) | list | length > 0
        fail_msg: "Nebula Sync PRIMARY/REPLICAS environment does not match inventory."
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host
        - not (nebula_sync_use_secret_files | default(true) | bool)

    - name: Stat Nebula Sync primary secret file
      ansible.builtin.stat:
        path: "{{ nebula_sync_secret_host_dir }}/{{ nebula_sync_primary_secret_filename | default('primary') }}"
      register: nebula_sync_primary_secret_stat
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host
        - nebula_sync_use_secret_files | default(true) | bool

    - name: Stat Nebula Sync replicas secret file
      ansible.builtin.stat:
        path: "{{ nebula_sync_secret_host_dir }}/{{ nebula_sync_replicas_secret_filename | default('replicas') }}"
      register: nebula_sync_replicas_secret_stat
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host
        - nebula_sync_use_secret_files | default(true) | bool

    - name: Assert Nebula Sync secret files are restrictive
      ansible.builtin.assert:
        that:
          - nebula_sync_primary_secret_stat.stat.exists | default(false)
          - nebula_sync_replicas_secret_stat.stat.exists | default(false)
          - nebula_sync_primary_secret_stat.stat.mode == '0400'
          - nebula_sync_replicas_secret_stat.stat.mode == '0400'
        fail_msg: "Nebula Sync secret files are missing or not mode 0400."
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host
        - nebula_sync_use_secret_files | default(true) | bool

    - name: Verify Nebula Sync replication end-to-end
      when:
        - nebula_sync_primary_url is defined
        - inventory_hostname == nebula_sync_controller_host
      block:
        - name: Wait for primary Pi-hole HTTP before Nebula replication test
          ansible.builtin.wait_for:
            host: "{{ hostvars[node1].ansible_host }}"
            port: 80
            timeout: 120
            delay: 3

        - name: Authenticate to primary Pi-hole API
          no_log: true
          ansible.builtin.uri:
            url: "{{ nebula_sync_primary_url }}/api/auth"
            method: POST
            body_format: json
            body:
              password: "{{ pihole_api_password }}"
            validate_certs: false
            status_code: [200]
          register: pihole_primary_auth
          until: >-
            pihole_primary_auth is succeeded
            and (pihole_primary_auth.json.session.sid | default('') | length > 0)
          retries: 30
          delay: 3

        - name: Set primary Pi-hole API session facts
          no_log: true
          ansible.builtin.set_fact:
            pihole_primary_sid: "{{ pihole_primary_auth.json.session.sid }}"
            pihole_primary_csrf: "{{ pihole_primary_auth.json.session.csrf | default('') }}"

        - name: Query primary blocklists before Nebula replication test
          ansible.builtin.uri:
            url: "{{ nebula_sync_primary_url }}/api/lists?type=block"
            method: GET
            headers:
              X-FTL-SID: "{{ pihole_primary_sid }}"
              X-FTL-CSRF: "{{ pihole_primary_csrf }}"
            validate_certs: false
            status_code: [200]
          register: pihole_primary_lists_pretest

        - name: Set stale temporary blocklist id on primary (pre-test cleanup)
          ansible.builtin.set_fact:
            nebula_sync_test_list_id_pretest: >-
              {{
                (
                  pihole_primary_lists_pretest.json.lists
                  | default(pihole_primary_lists_pretest.json.list | default([]))
                  | selectattr('address', 'defined')
                  | selectattr('address', 'equalto', nebula_sync_test_list_url_legacy)
                  | map(attribute='id')
                  | list
                  | first
                  | default(none)
                )
              }}
          when: pihole_primary_lists_pretest is succeeded

        - name: Remove stale temporary blocklist on primary before test
          ansible.builtin.uri:
            url: "{{ nebula_sync_primary_url }}/api/lists/{{ nebula_sync_test_list_id_pretest }}?type=block"
            method: DELETE
            headers:
              X-FTL-SID: "{{ pihole_primary_sid }}"
              X-FTL-CSRF: "{{ pihole_primary_csrf }}"
            validate_certs: false
            status_code: [200, 204, 404]
          when:
            - nebula_sync_test_list_id_pretest is not none
            - nebula_sync_test_list_id_pretest | string | length > 0

        - name: Set unique Nebula Sync test blocklist URL for this verify run
          ansible.builtin.set_fact:
            nebula_sync_test_list_url: "https://example.invalid/nebula-sync-test-{{ lookup('pipe', 'date +%s') }}.txt"

        - name: Create temporary blocklist on primary via Pi-hole API
          ansible.builtin.uri:
            url: "{{ nebula_sync_primary_url }}/api/lists?type=block"
            method: POST
            headers:
              X-FTL-SID: "{{ pihole_primary_sid }}"
              X-FTL-CSRF: "{{ pihole_primary_csrf }}"
            body_format: json
            body:
              address: "{{ nebula_sync_test_list_url }}"
              enabled: true
              comment: "{{ nebula_sync_test_list_comment }}"
            validate_certs: false
            status_code: [200, 201, 409, 400]
          register: nebula_sync_test_list_create
          failed_when: >-
            nebula_sync_test_list_create.status not in [200, 201, 409]
            and not (
              nebula_sync_test_list_create.status == 400
              and nebula_sync_test_list_create.json.error.key | default('') == 'database_error'
              and 'UNIQUE constraint' in (nebula_sync_test_list_create.json.error.hint | default(''))
            )

        - name: Run Nebula Sync once for replication verification
          ansible.builtin.shell: |
            set -euo pipefail
            tmp_env="$(mktemp)"
            grep -v '^CRON=' "{{ nebula_sync_env_host_path }}" > "${tmp_env}"
            image="$(docker inspect -f '{% raw %}{{.Config.Image}}{% endraw %}' "{{ nebula_sync_container_name | default('nebula') }}")"
            trap 'rm -f "${tmp_env}"' EXIT
            timeout 180 docker run --rm \
              --env-file "${tmp_env}" \
              -e API_ENABLED=false \
              -v "{{ nebula_sync_primary_secret_bind_mount }}" \
              -v "{{ nebula_sync_replicas_secret_bind_mount }}" \
              "${image}" run
          args:
            executable: /bin/bash
          register: nebula_sync_run
          changed_when: true

        - name: Report Nebula Sync run failure (no credential output)
          ansible.builtin.fail:
            msg: >-
              nebula-sync run failed with rc={{ nebula_sync_run.rc }} on
              {{ nebula_sync_controller_host }}; inspect with
              docker logs {{ nebula_sync_container_name | default('nebula') }} --tail 100
          when: nebula_sync_run.rc != 0

        - name: Wait for replica Pi-hole HTTP after Nebula sync
          ansible.builtin.wait_for:
            host: "{{ hostvars[nebula_sync_replica_host].ansible_host }}"
            port: 80
            timeout: 120
            delay: 3

        - name: Authenticate to replica Pi-hole API
          no_log: true
          ansible.builtin.uri:
            url: "{{ nebula_sync_replica_api_url }}/api/auth"
            method: POST
            body_format: json
            body:
              password: "{{ pihole_api_password }}"
            validate_certs: false
            status_code: [200]
          register: pihole_replica_auth
          until: >-
            pihole_replica_auth is succeeded
            and (pihole_replica_auth.json.session.sid | default('') | length > 0)
          retries: 30
          delay: 3

        - name: Set replica Pi-hole API session facts
          no_log: true
          ansible.builtin.set_fact:
            pihole_replica_sid: "{{ pihole_replica_auth.json.session.sid }}"
            pihole_replica_csrf: "{{ pihole_replica_auth.json.session.csrf | default('') }}"

        - name: Wait for replicated blocklist on replica via Pi-hole API
          ansible.builtin.uri:
            url: "{{ nebula_sync_replica_api_url }}/api/lists?type=block"
            method: GET
            headers:
              X-FTL-SID: "{{ pihole_replica_sid }}"
              X-FTL-CSRF: "{{ pihole_replica_csrf }}"
            validate_certs: false
            status_code: [200]
          register: pihole_replica_lists
          until: >-
            (
              pihole_replica_lists.json.lists
              | default(pihole_replica_lists.json.list | default([]))
              | selectattr('address', 'defined')
              | selectattr('address', 'equalto', nebula_sync_test_list_url)
              | list
              | length
            ) > 0
          retries: 20
          delay: 3

        - name: Assert Nebula Sync replicated temporary blocklist to replica
          ansible.builtin.assert:
            that:
              - >-
                (
                  pihole_replica_lists.json.lists
                  | default(pihole_replica_lists.json.list | default([]))
                  | selectattr('address', 'defined')
                  | selectattr('address', 'equalto', nebula_sync_test_list_url)
                  | list
                  | length
                ) > 0
            fail_msg: >-
              Nebula Sync did not replicate temporary blocklist {{ nebula_sync_test_list_url }}
              to {{ nebula_sync_replica_host }}.

      always:
        - name: Authenticate to primary Pi-hole API for cleanup
          no_log: true
          ansible.builtin.uri:
            url: "{{ nebula_sync_primary_url }}/api/auth"
            method: POST
            body_format: json
            body:
              password: "{{ pihole_api_password }}"
            validate_certs: false
            status_code: [200]
          register: pihole_primary_auth_cleanup
          failed_when: false
          when: inventory_hostname == nebula_sync_controller_host

        - name: Set primary Pi-hole API cleanup session facts
          no_log: true
          ansible.builtin.set_fact:
            pihole_primary_auth_cleanup_sid: >-
              {{
                pihole_primary_auth_cleanup.json.session.sid
                if (
                  pihole_primary_auth_cleanup is succeeded
                  and (pihole_primary_auth_cleanup.json is defined)
                  and (pihole_primary_auth_cleanup.json.session is defined)
                )
                else (pihole_primary_sid | default(''))
              }}
            pihole_primary_auth_cleanup_csrf: >-
              {{
                pihole_primary_auth_cleanup.json.session.csrf | default('')
                if (
                  pihole_primary_auth_cleanup is succeeded
                  and (pihole_primary_auth_cleanup.json is defined)
                  and (pihole_primary_auth_cleanup.json.session is defined)
                )
                else (pihole_primary_csrf | default(''))
              }}
          when: inventory_hostname == nebula_sync_controller_host

        - name: Query primary blocklists for cleanup
          ansible.builtin.uri:
            url: "{{ nebula_sync_primary_url }}/api/lists?type=block"
            method: GET
            headers:
              X-FTL-SID: "{{ pihole_primary_auth_cleanup_sid }}"
              X-FTL-CSRF: "{{ pihole_primary_auth_cleanup_csrf }}"
            validate_certs: false
            status_code: [200]
          register: pihole_primary_lists_cleanup
          when:
            - inventory_hostname == nebula_sync_controller_host
            - pihole_primary_auth_cleanup_sid | default('') | length > 0
          failed_when: false

        - name: Set temporary blocklist id on primary for cleanup
          ansible.builtin.set_fact:
            nebula_sync_test_list_id_primary: >-
              {{
                (
                  pihole_primary_lists_cleanup.json.lists
                  | default(pihole_primary_lists_cleanup.json.list | default([]))
                  | selectattr('address', 'defined')
                  | selectattr('address', 'equalto', nebula_sync_test_list_url)
                  | map(attribute='id')
                  | list
                  | first
                  | default(none)
                )
              }}
          when:
            - inventory_hostname == nebula_sync_controller_host
            - pihole_primary_lists_cleanup is succeeded

        - name: Remove temporary blocklist from primary via Pi-hole API
          ansible.builtin.uri:
            url: "{{ nebula_sync_primary_url }}/api/lists/{{ nebula_sync_test_list_id_primary }}?type=block"
            method: DELETE
            headers:
              X-FTL-SID: "{{ pihole_primary_auth_cleanup_sid }}"
              X-FTL-CSRF: "{{ pihole_primary_auth_cleanup_csrf }}"
            validate_certs: false
            status_code: [200, 204, 404]
          when:
            - inventory_hostname == nebula_sync_controller_host
            - pihole_primary_auth_cleanup_sid | default('') | length > 0
            - nebula_sync_test_list_id_primary is not none
            - nebula_sync_test_list_id_primary | string | length > 0
          failed_when: false

        - name: Run Nebula Sync to propagate cleanup
          ansible.builtin.shell: |
            set -euo pipefail
            tmp_env="$(mktemp)"
            grep -v '^CRON=' "{{ nebula_sync_env_host_path }}" > "${tmp_env}"
            image="$(docker inspect -f '{% raw %}{{.Config.Image}}{% endraw %}' "{{ nebula_sync_container_name | default('nebula') }}")"
            trap 'rm -f "${tmp_env}"' EXIT
            timeout 180 docker run --rm \
              --env-file "${tmp_env}" \
              -e API_ENABLED=false \
              -v "{{ nebula_sync_primary_secret_bind_mount }}" \
              -v "{{ nebula_sync_replicas_secret_bind_mount }}" \
              "${image}" run
          args:
            executable: /bin/bash
          changed_when: true
          failed_when: false
          when: inventory_hostname == nebula_sync_controller_host

        - name: Authenticate to replica Pi-hole API for cleanup
          no_log: true
          ansible.builtin.uri:
            url: "{{ nebula_sync_replica_api_url }}/api/auth"
            method: POST
            body_format: json
            body:
              password: "{{ pihole_api_password }}"
            validate_certs: false
            status_code: [200]
          register: pihole_replica_auth_cleanup
          until: >-
            pihole_replica_auth_cleanup is succeeded
            and (pihole_replica_auth_cleanup.json.session.sid | default('') | length > 0)
          retries: 15
          delay: 2
          failed_when: false
          when: inventory_hostname == nebula_sync_controller_host

        - name: Set replica Pi-hole API cleanup session facts
          no_log: true
          ansible.builtin.set_fact:
            pihole_replica_auth_cleanup_sid: >-
              {{
                pihole_replica_auth_cleanup.json.session.sid
                if (
                  pihole_replica_auth_cleanup is succeeded
                  and (pihole_replica_auth_cleanup.json is defined)
                  and (pihole_replica_auth_cleanup.json.session is defined)
                )
                else (pihole_replica_sid | default(''))
              }}
            pihole_replica_auth_cleanup_csrf: >-
              {{
                pihole_replica_auth_cleanup.json.session.csrf | default('')
                if (
                  pihole_replica_auth_cleanup is succeeded
                  and (pihole_replica_auth_cleanup.json is defined)
                  and (pihole_replica_auth_cleanup.json.session is defined)
                )
                else (pihole_replica_csrf | default(''))
              }}
          when: inventory_hostname == nebula_sync_controller_host

        - name: Query replica blocklists for cleanup
          ansible.builtin.uri:
            url: "{{ nebula_sync_replica_api_url }}/api/lists?type=block"
            method: GET
            headers:
              X-FTL-SID: "{{ pihole_replica_auth_cleanup_sid }}"
              X-FTL-CSRF: "{{ pihole_replica_auth_cleanup_csrf }}"
            validate_certs: false
            status_code: [200]
          register: pihole_replica_lists_cleanup
          when:
            - inventory_hostname == nebula_sync_controller_host
            - pihole_replica_auth_cleanup_sid | default('') | length > 0
          failed_when: false

        - name: Set temporary blocklist id on replica for cleanup
          ansible.builtin.set_fact:
            nebula_sync_test_list_id_replica: >-
              {{
                (
                  pihole_replica_lists_cleanup.json.lists
                  | default(pihole_replica_lists_cleanup.json.list | default([]))
                  | selectattr('address', 'defined')
                  | selectattr('address', 'equalto', nebula_sync_test_list_url)
                  | map(attribute='id')
                  | list
                  | first
                  | default(none)
                )
              }}
          when:
            - inventory_hostname == nebula_sync_controller_host
            - pihole_replica_lists_cleanup is succeeded

        - name: Remove temporary blocklist from replica via Pi-hole API (fallback)
          ansible.builtin.uri:
            url: "{{ nebula_sync_replica_api_url }}/api/lists/{{ nebula_sync_test_list_id_replica }}?type=block"
            method: DELETE
            headers:
              X-FTL-SID: "{{ pihole_replica_auth_cleanup_sid }}"
              X-FTL-CSRF: "{{ pihole_replica_auth_cleanup_csrf }}"
            validate_certs: false
            status_code: [200, 204, 404]
          when:
            - inventory_hostname == nebula_sync_controller_host
            - pihole_replica_auth_cleanup_sid | default('') | length > 0
            - nebula_sync_test_list_id_replica is not none
            - nebula_sync_test_list_id_replica | string | length > 0
          failed_when: false

        - name: Log out primary Pi-hole API session
          ansible.builtin.uri:
            url: "{{ nebula_sync_primary_url }}/api/auth"
            method: DELETE
            headers:
              X-FTL-SID: "{{ pihole_primary_auth_cleanup_sid }}"
            validate_certs: false
            status_code: [200, 204, 404]
          when:
            - inventory_hostname == nebula_sync_controller_host
            - pihole_primary_auth_cleanup_sid | default('') | length > 0
          failed_when: false

        - name: Log out replica Pi-hole API session
          ansible.builtin.uri:
            url: "{{ nebula_sync_replica_api_url }}/api/auth"
            method: DELETE
            headers:
              X-FTL-SID: "{{ pihole_replica_auth_cleanup_sid }}"
            validate_certs: false
            status_code: [200, 204, 404]
          when:
            - inventory_hostname == nebula_sync_controller_host
            - pihole_replica_auth_cleanup_sid | default('') | length > 0
          failed_when: false

    # --- Docker container stop triggers VIP move ---
    - name: Check HA container on primary before docker failover test
      community.docker.docker_container_info:
        name: "{{ ha_container_name }}"
      register: ha_container_info_node1
      when: inventory_hostname == node1

    - name: Assert HA container exists on primary
      ansible.builtin.assert:
        that:
          - ha_container_info_node1.exists | default(false)
        fail_msg: >-
          Precondition failed: container {{ ha_container_name }} not found on {{ node1 }}.
      when: inventory_hostname == node1

    - name: Verify container-stop health failover and restore primary
      block:
        - name: Stop Pi-hole container on primary to trigger failover
          community.docker.docker_container:
            name: "{{ ha_container_name }}"
            state: stopped
          when: inventory_hostname == node1

        - name: Wait for Keepalived health check to fail on primary
          ansible.builtin.command: /etc/keepalived/check_pihole.sh
          register: pihole_health_after_container_stop
          changed_when: false
          failed_when: false
          when: inventory_hostname == node1
          retries: 10
          delay: 2
          until: pihole_health_after_container_stop.rc != 0

        - name: Assert Keepalived detects the stopped Pi-hole container
          ansible.builtin.assert:
            that:
              - pihole_health_after_container_stop.rc != 0
            fail_msg: >-
              HEALTH CHECK FAILED: /etc/keepalived/check_pihole.sh remained healthy
              after stopping container {{ ha_container_name }} on {{ node1 }}.
          when: inventory_hostname == node1

        - name: Wait for VIP on backup after container stop on primary
          ansible.builtin.command: ip -4 addr show
          register: ip_node2_docker_failover
          changed_when: false
          when: inventory_hostname == node2
          retries: 30
          delay: 2
          until: vip_address in ip_node2_docker_failover.stdout

        - name: Assert VIP is on backup after container stop on primary
          ansible.builtin.assert:
            that:
              - vip_address in ip_node2_docker_failover.stdout
            fail_msg: >-
              CONTAINER FAILOVER FAILED: VIP {{ vip_address }} not found on {{ node2 }}
              after stopping container {{ ha_container_name }} on {{ node1 }}.
          when: inventory_hostname == node2

        - name: Collect addresses on primary after container stop
          ansible.builtin.command: ip -4 addr show
          register: ip_node1_post_container_stop
          changed_when: false
          when: inventory_hostname == node1

        - name: Assert VIP is absent from primary after container stop
          ansible.builtin.assert:
            that:
              - vip_address not in ip_node1_post_container_stop.stdout
            fail_msg: >-
              CONTAINER FAILOVER INCOMPLETE: VIP {{ vip_address }} still present on {{ node1 }}
              after stopping container {{ ha_container_name }}.
          when: inventory_hostname == node1
      always:
        - name: Start Pi-hole container on primary after container failover test
          community.docker.docker_container:
            name: "{{ ha_container_name }}"
            state: started
          when: inventory_hostname == node1

        - name: Wait for Pi-hole DNS recovery after container failover test
          ansible.builtin.command: /etc/keepalived/check_pihole.sh
          register: pihole_health_after_container_restore
          changed_when: false
          when: inventory_hostname == node1
          retries: 30
          delay: 2
          until: pihole_health_after_container_restore.rc == 0

    - name: Disable local DNS service on primary (functional failover test)
      ansible.builtin.command: docker exec {{ ha_container_name }} sh -lc "pkill -TERM pihole-FTL || true; exit 0"
      register: pihole_dns_stop_primary
      changed_when: true
      failed_when: false
      when: inventory_hostname == node1

    - name: Wait for VIP on backup after functional DNS failure
      ansible.builtin.command: ip -4 addr show
      register: ip_node2_dns_failover
      changed_when: false
      when: inventory_hostname == node2
      retries: 20
      delay: 3
      until: vip_address in ip_node2_dns_failover.stdout

    - name: Assert VIP moved to backup after DNS failure on primary
      ansible.builtin.assert:
        that:
          - vip_address in ip_node2_dns_failover.stdout
        fail_msg: >-
          DNS FAILOVER FAILED: VIP {{ vip_address }} not found on {{ node2 }}
          after stopping local DNS service on {{ node1 }}.
      when: inventory_hostname == node2

    - name: Restore Pi-hole container on primary after DNS failure test
      ansible.builtin.command: docker restart {{ ha_container_name }}
      register: pihole_restart_primary_after_dns_fail
      changed_when: "'Restarted' in (pihole_restart_primary_after_dns_fail.stdout | default(''))"
      when: inventory_hostname == node1

    - name: Wait for VIP return to primary after DNS recovery
      ansible.builtin.command: ip -4 addr show
      register: ip_node1_dns_recovery
      changed_when: false
      when: inventory_hostname == node1
      retries: 20
      delay: 3
      until: vip_address in ip_node1_dns_recovery.stdout

    - name: Assert VIP returned to primary after DNS recovery
      ansible.builtin.assert:
        that:
          - vip_address in ip_node1_dns_recovery.stdout
        fail_msg: >-
          DNS RECOVERY FAILED: VIP {{ vip_address }} did not return to {{ node1 }}
          after restoring Pi-hole DNS service.
      when: inventory_hostname == node1
