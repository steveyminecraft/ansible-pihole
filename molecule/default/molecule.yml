---
# Molecule scenario: Rocky-style image + full stack (see converge.yml).
dependency:
  name: shell
  command: ${MOLECULE_PROJECT_DIRECTORY}/scripts/install-ansible-collections.sh
driver:
  name: vagrant
platforms:
  - name: vagrant-pihole-01
    box: "local/rocky10-kvm"
    hostname: vagrant-pihole-01
    interfaces:
      - network_name: private_network
        type: static
        ip: 192.168.56.4
    memory: 2048
    cpus: 2
  - name: vagrant-pihole-02
    box: "local/rocky10-kvm"
    hostname: vagrant-pihole-02
    interfaces:
      - network_name: private_network
        type: static
        ip: 192.168.56.5
    memory: 2048
    cpus: 2

provisioner:
  name: ansible
  # Richer task/module output (1=default, 2–3=more; override with `ANSIBLE_VERBOSITY` or `-v`).
  config_options:
    defaults:
      verbosity: 2
  connection_options:
    ansible_ssh_user: vagrant
    # Same key Vagrant authorizes; required when guests disable password auth (EL images).
    ansible_ssh_private_key_file: ~/.vagrant.d/insecure_private_key
    ansible_password: vagrant
    ansible_become: true
  inventory:
    links:
      hosts: ../../inventory/${MOLECULE_VAGRANT_INVENTORY:-vagrant.yml}
  playbooks:
    create: create.yml
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
    destroy: destroy.yml
  env:
    ANSIBLE_INJECT_FACTS_AS_VARS: "false"
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/roles
    ANSIBLE_COLLECTIONS_PATH: ${MOLECULE_PROJECT_DIRECTORY}/collections:${MOLECULE_PROJECT_DIRECTORY}/.ansible/collections
verifier:
  name: ansible
scenario:
  name: default
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - verify
    - destroy
