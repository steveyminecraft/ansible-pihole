---
- name: Enable nonlocal IP binding
  ansible.posix.sysctl:
    name: net.ipv4.ip_nonlocal_bind
    value: '1'
    state: present
    reload: true

- name: Enable IP forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: true

- name: Flush handlers
  meta: flush_handlers

- name: Install keepalived Debian
  ansible.builtin.apt:
    pkg:
      - keepalived
    force_apt_get: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Install keepalived Rocky
  yum:
    name:
      - kernel-headers
      - kernel-devel
      - keepalived
      - policycoreutils-python-utils
      - python3-pip
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

- name: Change the keepalived_t domain to permissive
  community.general.selinux_permissive:
    name: keepalived_t
    permissive: true
  when: ansible_facts['os_family'] == 'RedHat'

# Since yum doesn't like using notify because yum we have to this instead
- name: Start service keepalived started, if not started
  ansible.builtin.service:
    name: keepalived
    state: stopped
    enabled: true
  when: ansible_facts['os_family'] == 'RedHat'

- name: Copy check_pihole.sh
  copy:
    dest: /etc/keepalived/check_pihole.sh
    src: check_pihole.sh
    mode: "0755"

# Finds the IP_ADDRS of the group and removes the ansible_host ip's from it's peer list
- name: Find Local IP Addresses
  set_fact:
    keepalived_local_ips: "{{ ansible_facts['all_ipv4_addresses'] + ansible_facts['all_ipv6_addresses'] }}"

- name: Create a list of peer IPs excluding local IPs and ensure /24 suffix
  set_fact:
    keepalived_peer_list: >-
      {{ groups['all']
         | map('extract', hostvars, 'ansible_host')
         | difference(keepalived_local_ips)
         | map('regex_replace', '^(.*?)(/\\d+)?$', '\g<1>/24')
         | list }}

# Step 3: Debug the keepalived_peer_list
- name: Debug keepalived_peer_list
  debug:
    msg: "Peer IPs with /24 for host {{ inventory_hostname }}: {{ keepalived_peer_list }}"

# Vagrant: default route is often the NAT NIC; VRRP must bind to private_network (names vary: eth1, ens6, enp0s8, …).
- name: Resolve keepalived VRRP interface from ansible_host (Rocky / Ubuntu Vagrant)
  when:
    - vagrant_env | default(false) | bool
    - ansible_facts['os_family'] in ['RedHat', 'Debian']
  block:
    - name: Find global-scope interface carrying inventory ansible_host
      ansible.builtin.shell: |
        set -euo pipefail
        TARGET="{{ ansible_host | trim }}"
        while read -r _num dev fam addr _rest; do
          [ "${fam:-}" = "inet" ] || continue
          iponly="${addr%%/*}"
          [ "$iponly" = "$TARGET" ] || continue
          printf '%s\n' "$dev"
          exit 0
        done < <(ip -o -4 addr show scope global)
        printf 'keepalived: no IPv4 global scope interface matched ansible_host=%s\n' "$TARGET" >&2
        exit 1
      args:
        executable: /bin/bash
      register: _keepalived_iface_from_host
      changed_when: false

    - name: Set keepalived VRRP interface and unicast source (private lab NIC)
      ansible.builtin.set_fact:
        keepalived_vrrp_interface: "{{ _keepalived_iface_from_host.stdout | trim }}"
        keepalived_vrrp_src_address: "{{ ansible_host | trim }}"

- name: Configure keepalived
  template:
    dest: /tmp/keepalived.conf
    src: keepalived.j2
    mode: "0644"
  notify: Restart keepalived service

- name: Read generated keepalived config from /tmp
  ansible.builtin.slurp:
    src: /tmp/keepalived.conf
  register: keepalived_tmp_conf

- name: Write sanitized keepalived config
  ansible.builtin.copy:
    dest: /etc/keepalived/keepalived.conf
    content: >-
      {{
        keepalived_tmp_conf.content
        | b64decode
        | regex_replace('\\[|\\]', '')
        | regex_replace("['\\\\]", '')
      }}
    owner: root
    group: root
    mode: '0644'

### Add in firewall rules for vrrp protocol
- name: Add VRRP protocol to firewall
  ansible.posix.firewalld:
    rich_rule: rule protocol value="vrrp" accept
    permanent: true
    state: enabled
  notify: Restart firewall config

- name: Flush handlers
  meta: flush_handlers
