---
- name: Add ssh key
  ansible.posix.authorized_key:
    key: https://github.com/{{ github_user_for_ssh_key }}.keys
    user: "{{ ansible_user }}"
    comment: "github-{{ github_user_for_ssh_key }}"
  # authorized_key cannot validate remote https:// URLs in check mode (CI uses --check).
  when: not ansible_check_mode

- name: "Lock password for {{ ansible_user }}"
  user:
    name: "{{ ansible_user }}"
    password_lock: true
  when: password_lock

- name: "Bashrc for {{ ansible_user }}"
  blockinfile:
    path: "{{ ansible_user_home_dir }}/.bashrc"
    block: alias ll='ls -la'
    create: true
    mode: "0644"

- name: Bashrc for "{{ ansible_user }}"
  blockinfile:
    path: "{{ ansible_user_home_dir }}/.bashrc"
    create: true
    mode: "0644"
    block: |
      export LS_OPTIONS='--color=auto'
      eval "`dircolors`"
      alias ls='ls $LS_OPTIONS'
      alias ll='ls $LS_OPTIONS -la'
      alias l='ls $LS_OPTIONS -lA'

      if ! shopt -oq posix; then
        if [ -f /usr/share/bash-completion/bash_completion ]; then
          . /usr/share/bash-completion/bash_completion
        elif [ -f /etc/bash_completion ]; then
          . /etc/bash_completion
        fi
      fi

- name: Set timezone
  lineinfile:
    path: /etc/timezone
    regexp: "^"
    line: "{{ timezone }}"
  when: ansible_facts['distribution'] == 'Debian' or ansible_facts['distribution'] == 'Ubuntu'

- name: Set localtime
  file:
    src: /usr/share/zoneinfo/{{ timezone }}
    dest: /etc/localtime
    state: link
  when: ansible_facts['distribution'] == 'Debian' or ansible_facts['distribution'] == 'Ubuntu'

- name: "Set timezone to {{ timezone }}"
  community.general.timezone:
    name: "{{ timezone }}"
  # Uses hwclock; skip in check mode so CI and slim images do not need that binary.
  when: not ansible_check_mode

- name: Set a hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
    use: systemd
  when: not ansible_check_mode

- name: Set hostname
  lineinfile:
    path: /etc/hostname
    regexp: "^"
    line: "{{ inventory_hostname }}"
  notify: Reboot after hostname change
  when: ansible_facts['distribution'] == 'Debian' or ansible_facts['distribution'] == 'Ubuntu'

- name: Set hosts
  lineinfile:
    path: /etc/hosts
    regexp: "^127.0.1.1"
    line: 127.0.1.1       {{ inventory_hostname }}
  notify: Reboot after hostname change

- name: Set custom DNS servers
  blockinfile:
    path: /etc/dhcpcd.conf
    block: static domain_name_servers={{ static_dns }}
  notify: Restart dhcpcd
  when: ansible_facts['distribution'] == 'Debian' and ansible_facts['architecture'] == 'aarch64'

- name: Install requirements Debian
  ansible.builtin.apt:
    pkg:
      - firewalld
      - python3-pip
      - python3-docker
    update_cache: true
  when: ansible_facts['distribution'] == 'Debian' or ansible_facts['distribution'] == 'Ubuntu'

- name: Install Rocky/RHEL base packages (pip, bind-utils, Docker Python SDK)
  when: ansible_facts['distribution'] == 'Rocky' or ansible_facts['distribution'] == 'Red Hat Enterprise Linux'
  block:
    - name: Install packages via dnf
      ansible.builtin.dnf:
        name:
          - python3-pip
          - bind-utils
          - python3-docker
        state: present
  rescue:
    - name: Install packages via dnf without python3-docker RPM
      ansible.builtin.dnf:
        name:
          - python3-pip
          - bind-utils
        state: present

    - name: Install Docker Python library via pip
      ansible.builtin.pip:
        name: docker
        state: present


- name: Flush handlers
  meta: flush_handlers
