---
- name: Create pihole directory
  ansible.builtin.file:
    path: "{{ pihole_compose_dir }}"
    owner: "root"
    group: "root"
    state: directory
    mode: '0750'

- name: Deploy Docker Compose file
  no_log: true
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ pihole_compose_dir }}/docker-compose.yml"
    owner: "root"
    group: "root"
    mode: '0600'
  register: pihole_compose_template

- name: Pull docker image
  community.docker.docker_image_pull:
    name: "{{ pihole_image }}"
    platform: "{{ ansible_facts['architecture'] }}"

# Free 127.0.0.1:53 / avoid stub on 127.0.0.53 fighting Docker-published Pi-hole DNS.
# Not gated on pihole_firewall_deploy — firewalld and resolved are separate concerns.
- name: Configure systemd-resolved for Pi-hole (Debian family)
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] in ['Ubuntu', 'Debian']
    - pihole_configure_systemd_resolved | default(true) | bool

  block:
    - name: Disable stub listener
      ansible.builtin.replace:
        path: /etc/systemd/resolved.conf
        regexp: '^#?DNSStubListener=.*'
        replace: 'DNSStubListener=no'
      notify: Restart resolver

    - name: Disable DNSStubListener in systemd-resolved configuration
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^#?DNSStubListener='
        line: 'DNSStubListener=no'
        backup: true
      notify: Restart resolver

    - name: Remove /etc/resolv.conf if it exists
      ansible.builtin.file:
        path: /etc/resolv.conf
        state: absent

    - name: Create symlink for resolv.conf
      ansible.builtin.file:
        src: /run/systemd/resolve/resolv.conf
        dest: /etc/resolv.conf
        state: link
      notify: Restart resolver

    - name: Restart systemd-resolved after stub listener disabled
      ansible.builtin.service:
        name: systemd-resolved
        state: restarted

- name: Apply resolver handlers before publishing Pi-hole DNS ports
  ansible.builtin.meta: flush_handlers

- name: Wait until host TCP port 53 is free for Pi-hole publish
  ansible.builtin.wait_for:
    host: 0.0.0.0
    port: 53
    state: stopped
    timeout: 120
    delay: 2
  when:
    - not (pihole_use_host_network | default(false) | bool)
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts['distribution'] in ['Ubuntu', 'Debian']
    - pihole_configure_systemd_resolved | default(true) | bool

- name: Start Pi-hole service (docker compose v2)
  vars:
    _pihole_compose_needs_recreate: >-
      {{
        (pihole_force_recreate | default(false) | bool)
        or (pihole_compose_template.changed | default(false) | bool)
      }}
  community.docker.docker_compose_v2:
    project_src: "{{ pihole_compose_dir }}"
    files:
      - "{{ pihole_compose_file | default(pihole_compose_dir ~ '/docker-compose.yml') }}"
    state: present
    pull: missing
    recreate: "{{ 'always' if _pihole_compose_needs_recreate else 'auto' }}"

# Compose creates project networks (e.g. pihole_default); NAT must match real IPAM subnets.
- name: Refresh EL Docker NAT rules after compose networks exist
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/tasks/redhat_nat_fallback.yml"
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - not (pihole_docker_manage_iptables | default(true) | bool)
    - pihole_docker_el_nat_fallback | default(true) | bool
