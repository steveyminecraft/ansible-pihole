---
# Main task file for Pi-hole setup using Ansible
- name: Combine pihole_environment_variables with inventory values take precedence
  ansible.builtin.set_fact:
    pihole_environment_variables: "{{ pihole_vars_environment_variables | default({}) | combine(pihole_environment_variables, recursive=True) }}"

# Inventory often sets pihole_compose_dir only; pre.yml and docker volumes use
# pihole_dir_loc. Keep a single effective root so bind-mount paths match compose and
# deploypi chdir.
- name: Align pihole_dir_loc with pihole_compose_dir from inventory
  ansible.builtin.set_fact:
    pihole_dir_loc: >-
      {{
        pihole_compose_dir
        | default(
            pihole_dir_loc
            | default(lookup('ansible.builtin.vars', 'dir_loc', default='/opt/pihole'))
          )
      }}

# Role tasks use pihole_firewall_deploy; normalize to a strict bool.
- name: Normalize pihole_firewall_deploy to bool
  ansible.builtin.set_fact:
    pihole_firewall_deploy: "{{ pihole_firewall_deploy | bool }}"
  when: pihole_firewall_deploy is defined

- name: Validate Pi-hole Web/API password is configured securely
  no_log: true
  ansible.builtin.assert:
    that:
      - pihole_environment_variables.FTLCONF_webserver_api_password is defined
      - (pihole_environment_variables.FTLCONF_webserver_api_password | string | length) >= 16
      - (pihole_environment_variables.FTLCONF_webserver_api_password | string) not in ['Testing 101', 'Intranet', 'CHANGE_ME', '']
    fail_msg: >-
      Define a non-default Pi-hole Web/API password (minimum 16 chars) in inventory/vault
      before deploying Pi-hole.

- name: Validate explicit container resolver configuration when override is enabled
  ansible.builtin.assert:
    that:
      - (pihole_startup_dns | default([]) | length) > 0
    fail_msg: >-
      Set pihole_startup_dns when pihole_override_container_resolver=true.
  when: pihole_override_container_resolver | default(false) | bool

- name: Validate explicit Pi-hole upstreams when Unbound is disabled
  ansible.builtin.assert:
    that:
      - >-
        (pihole_upstream_resolvers | default([]) | length > 0)
        or
        (
          pihole_environment_variables.FTLCONF_dns_upstreams is defined
          and (pihole_environment_variables.FTLCONF_dns_upstreams | string | length > 0)
        )
    fail_msg: >-
      Set pihole_upstream_resolvers or pihole_environment_variables.FTLCONF_dns_upstreams
      when pihole_enable_unbound=false.
  when: not (pihole_enable_unbound | default(true) | bool)

- name: Configure explicit Pi-hole upstream resolvers
  ansible.builtin.set_fact:
    pihole_environment_variables: >-
      {{
        pihole_environment_variables
        | combine({'FTLCONF_dns_upstreams': pihole_upstream_resolvers | join(';')}, recursive=True)
      }}
  when:
    - not (pihole_enable_unbound | default(true) | bool)
    - pihole_upstream_resolvers | default([]) | length > 0

- name: Remove managed Unbound container when disabled
  community.docker.docker_container:
    name: "{{ unbound_container_name | default('unbound') }}"
    state: absent
  when: not (pihole_enable_unbound | default(true) | bool)

- name: Debian setup tasks
  ansible.builtin.include_tasks: debian.yml
  when: ansible_facts['distribution'] in ['Debian', 'Ubuntu']

- name: Redhat setup tasks
  ansible.builtin.include_tasks: redhat.yml
  when: ansible_facts['distribution'] in ['Rocky', 'Red Hat Enterprise Linux']

- name: Rocky networking debug (firewall off, dig on host, privileged container — opt-in)
  ansible.builtin.include_tasks: rocky_network_debug.yml
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - ansible_facts['distribution'] in ['Rocky', 'Red Hat Enterprise Linux']
    - pihole_rocky_network_debug | default(false) | bool

- name: Deploy Pi-hole container
  ansible.builtin.include_tasks: deploypi.yml

- name: Configure firewall
  ansible.builtin.include_tasks: firewall.yml
  when: pihole_firewall_deploy | bool

- name: Added Unbound
  ansible.builtin.include_tasks: unbound.yml
  when:
    - pihole_enable_unbound | default(true) | bool
    - not (pihole_use_host_network | default(false) | bool)

- name: Record that Unbound integration is disabled
  ansible.builtin.set_fact:
    pihole_unbound_present: false
  when: not (pihole_enable_unbound | default(true) | bool)

- name: Verify Pi-hole deployment
  ansible.builtin.include_tasks: verify.yml
