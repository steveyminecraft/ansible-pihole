---
- name: Install dependencies Debian
  ansible.builtin.apt:
    force_apt_get: true
    name:
      - ca-certificates
      - curl
      - gnupg2
      - software-properties-common
  when: ansible_facts['os_family'] == 'Debian'

# Use deb822 + keyring (Docker / Ubuntu 24+). ansible.builtin.apt_repository has mangled
# signed-by lines in the wild, leaving docker-compose-plugin out of the apt index.
- name: Set Docker apt facts for Debian family
  ansible.builtin.set_fact:
    docker_apt_linux_path: >-
      {{
        'ubuntu' if ansible_facts['distribution'] == 'Ubuntu'
        else (
          'raspbian'
          if ansible_facts['distribution'] == 'Debian' and ansible_facts['architecture'] == 'aarch64'
          else 'debian'
        )
      }}
    docker_apt_deb_arch: >-
      {{
        'amd64' if ansible_facts['architecture'] in ['x86_64', 'amd64']
        else ('arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64']
        else ansible_facts['architecture'])
      }}
    docker_apt_suite: >-
      {{
        (
          ansible_facts['distribution_release'] | default('')
          or ansible_facts.get('lsb', {}).get('codename', '')
        ) | trim
      }}
  when: ansible_facts['os_family'] == 'Debian'

- name: Ensure Debian/Ubuntu release codename is known for Docker CE apt
  ansible.builtin.assert:
    that:
      - docker_apt_suite | length > 0
    fail_msg: >-
      Need distribution_release or lsb.codename to configure Docker's apt source (got empty).
  when: ansible_facts['os_family'] == 'Debian'

- name: Ensure Docker apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_facts['os_family'] == 'Debian'

- name: Install Docker CE apt signing key (keyring)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/{{ docker_apt_linux_path }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    timeout: 45
  when: ansible_facts['os_family'] == 'Debian'

- name: Remove legacy one-line Docker list from this role (avoid duplicate stanzas)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent
  when: ansible_facts['os_family'] == 'Debian'

- name: Configure Docker CE apt source (deb822)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker-ce.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/{{ docker_apt_linux_path }}
      Suites: {{ docker_apt_suite }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc
      Architectures: {{ docker_apt_deb_arch }}
  when: ansible_facts['os_family'] == 'Debian'

- name: Refresh apt index after Docker CE source
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
  when: ansible_facts['os_family'] == 'Debian'
