---
- name: Configure Docker daemon (RedHat family)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "0600"
    content: >-
      {{
        {
          'iptables': (docker_manage_iptables | bool),
          'ip6tables': (docker_manage_iptables | bool) and (not docker_disable_ipv6 | default(false) | bool)
        }
        | combine(
          {'dns': docker_daemon_dns}
          if (docker_daemon_dns | default([]) | length > 0)
          else {}
        )
        | to_nice_json
      }}
  notify: Restart Docker
  when: ansible_facts['os_family'] == 'RedHat'

- name: Validate explicit Docker IPv6 CIDR when IPv6 is enabled (Debian family)
  ansible.builtin.assert:
    that:
      - (docker_ipv6_fixed_cidr | default('') | string | length) > 0
      - not ((docker_ipv6_fixed_cidr | string).startswith('2001:db8:'))
    fail_msg: >-
      Set docker_ipv6_fixed_cidr to a real, environment-specific IPv6 subnet when docker_ipv6_enabled=true.
      Documentation ranges (2001:db8::/32) are not allowed.
  when:
    - ansible_facts['os_family'] == 'Debian'
    - docker_ipv6_enabled | default(false) | bool

- name: Configure Docker IPv6 (Debian family)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "0600"
    content: >-
      {{
        {'ipv6': true, 'fixed-cidr-v6': docker_ipv6_fixed_cidr}
        | combine(
          {'dns': docker_daemon_dns}
          if (docker_daemon_dns | default([]) | length > 0)
          else {}
        )
        | to_nice_json
      }}
  notify: Restart Docker
  when:
    - ansible_facts['os_family'] == 'Debian'
    - docker_ipv6_enabled | default(false) | bool

- name: Configure Docker without explicit IPv6 (Debian family)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "0600"
    content: >-
      {{
        {'ipv6': false}
        | combine(
          {'dns': docker_daemon_dns}
          if (docker_daemon_dns | default([]) | length > 0)
          else {}
        )
        | to_nice_json
      }}
  notify: Restart Docker
  when:
    - ansible_facts['os_family'] == 'Debian'
    - not (docker_ipv6_enabled | default(false) | bool)
