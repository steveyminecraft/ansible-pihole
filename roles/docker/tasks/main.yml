---
- name: Configure Docker apt repository
  ansible.builtin.import_tasks: debian_repo.yml

- name: Configure Docker DNF repository
  ansible.builtin.import_tasks: redhat_repo.yml

- name: Install Docker packages
  ansible.builtin.import_tasks: install.yml

- name: Configure Docker host networking modules
  ansible.builtin.import_tasks: modules.yml

- name: Start Docker and collect diagnostics
  ansible.builtin.import_tasks: diagnostics.yml

- name: Configure Docker SDK and explicit group users
  ansible.builtin.import_tasks: users.yml

- name: Configure Docker daemon
  ansible.builtin.import_tasks: daemon.yml

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

# After Docker restarts (handler), re-apply NAT — restart can reset netfilter state before rules land.
- name: EL container egress when Docker does not manage iptables (NAT fallback)
  ansible.builtin.include_tasks: redhat_nat_fallback.yml
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - not (docker_manage_iptables | bool)
    - docker_el_nat_fallback | default(true) | bool
