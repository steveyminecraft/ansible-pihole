---
- name: Install dependencies Debian
  ansible.builtin.apt:
    force_apt_get: true
    name:
      - gnupg2
      - software-properties-common
  when: ansible_facts['distribution'] == 'Debian' or ansible_facts['distribution'] == 'Ubuntu'

# Ubuntu 22.04+ expects signed-by keyrings; plain "deb https://..." + apt_key often leaves the
# Docker repo untrusted, so docker-ce / docker-compose-plugin never appear in apt cache.
- name: Set Docker apt key/repo path for Debian family
  ansible.builtin.set_fact:
    docker_apt_linux_path: >-
      {{
        'ubuntu' if ansible_facts['distribution'] == 'Ubuntu'
        else (
          'raspbian'
          if ansible_facts['distribution'] == 'Debian' and ansible_facts['architecture'] == 'aarch64'
          else 'debian'
        )
      }}
    docker_apt_deb_arch: >-
      {{
        'amd64' if ansible_facts['architecture'] in ['x86_64', 'amd64']
        else ('arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64']
        else ansible_facts['architecture'])
      }}
  when: ansible_facts['distribution'] == 'Debian' or ansible_facts['distribution'] == 'Ubuntu'

- name: Ensure Docker apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_facts['distribution'] == 'Debian' or ansible_facts['distribution'] == 'Ubuntu'

- name: Install Docker CE apt signing key (keyring)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/{{ docker_apt_linux_path }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: ansible_facts['distribution'] == 'Debian' or ansible_facts['distribution'] == 'Ubuntu'

- name: Add Docker CE apt repository (signed-by keyring)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_deb_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ docker_apt_linux_path }}
      {{ ansible_facts['distribution_release'] }} stable
    filename: docker
    state: present
  when: ansible_facts['distribution'] == 'Debian' or ansible_facts['distribution'] == 'Ubuntu'

- name: "Install dependencies Red Hat"
  ansible.builtin.dnf:
    name:
      - dnf-utils
      - python3-pip
      - bind-utils
      - gnupg2
    state: present
  when: ansible_facts['distribution'] == 'Rocky' or ansible_facts['distribution'] == 'Red Hat Enterprise Linux'

- name: Add signing key
  ansible.builtin.rpm_key:
    key: "https://download.docker.com/linux/rhel/gpg"
    state: present
  when: ansible_facts['distribution'] == 'Rocky' or ansible_facts['distribution'] == 'Red Hat Enterprise Linux'

- name: Add Docker Red Hat repository
  ansible.builtin.yum_repository:
    name: docker-ce
    description: "Docker-CE Repo"
    baseurl: https://download.docker.com/linux/rhel/$releasever/$basearch/stable
    enabled: true
    gpgcheck: true
    gpgkey: "https://download.docker.com/linux/rhel/gpg"
  when: ansible_facts['distribution'] == 'Rocky' or ansible_facts['distribution'] == 'Red Hat Enterprise Linux'

- name: Install Docker Debian
  ansible.builtin.apt:
    force_apt_get: true
    update_cache: true
    name:
      - docker-ce
      - python3-setuptools
      - python3-pip
      - docker-compose-plugin
    install_recommends: false
  when: ansible_facts['distribution'] == 'Debian' or ansible_facts['distribution'] == 'Ubuntu'

- name: Install Docker Rocky
  ansible.builtin.dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  when: ansible_facts['distribution'] == 'Rocky' or ansible_facts['distribution'] == 'Red Hat Enterprise Linux'

# dnf does not always trigger handler ordering reliably with these tasks
- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  when: ansible_facts['distribution'] == 'Rocky' or ansible_facts['distribution'] == 'Red Hat Enterprise Linux'

- name: Install Docker SDK for python
  pip:
    name:
      - docker
    extra_args: "--user"
    break_system_packages: true

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    append: true
    groups: docker

- name: Enable Docker IPv6
  copy:
    dest: /etc/docker/daemon.json
    mode: "0600"
    content: |
      {
        "ipv6": true,
        "fixed-cidr-v6": "2001:db8:1::/64"
      }
  notify: Restart Docker

- name: Flush handlers
  meta: flush_handlers
